summary: |
  **Trained as a Statistical Engineer, I turn complex data systems into deployable AI products — from institutional governance down to the last decision-making mile.**

  6 years steering national-scale data at France Travail (partnering with INSEE & DARES),
  6 AI MVPs shipped to production (NLP, RAG, Time Series, Lead Scoring),
  one goal: every executive decision backed by reliable data and an actionable model.

  ### 🎯 What I deliver

  * **Governance & DataOps:** Zero defects in production over 12 months (QualiStat). SAP legacy pipeline automation eliminating 4h/month of manual processing (OptIMMO · France Travail DICN). Full Data Lake EDB (15 requirements) delivered for national IT migration.
  * **BI & C-Level Steering:** Restructured BI dashboards (Digdash · Power BI) serving 126+ active users. Strategic SPSI steering module for national real estate portfolios (1,000+ sites).
  * **Applied AI (NLP / GenAI / Forecasting):** Legal investigation cut from 3 weeks to 4 hours (Juris Sensus AI · Zero-Shot NLP). CAPEX/OPEX forecasting on multi-site real estate portfolios (Time Series Prophet). RAG architectures deployed on Streamlit.

  ### 🏗️ Domains & Sectors

  * **PropTech & Asset Management:** Budget modeling and steering of national real estate portfolios (SPSI · RE-FX · Tertiary Decree).
  * **LegalTech & Compliance:** Forensic NLP engines for massive semantic auditing (E-Discovery · AI Act · GDPR).
  * **Employment & Public Policy:** Production and industrialization of national strategic KPIs (datemploi · INSEE · DARES).

  ### 🛠️ Stack

  * **Product:** OKRs · PRD · MLOps Lifecycle · Backlog · Stakeholder Management
  * **Data Science & AI:** Python · XGBoost · Prophet · NLP (mDeBERTa, RAG, Zero-Shot) · LangChain
  * **Data Engineering:** SQL · SAS · VBA · SAP RE-FX · PySpark · REST API
  * **BI & Viz:** Power BI · Advanced DAX · Digdash Studio · Streamlit
  * **DevOps:** GitOps · CI/CD · Docs-as-Code · Docusaurus

