summary: |
  **Applied Mathematician turned Data Product Manager — I transform complex data systems into reliable decision-making products, from institutional governance to the last mile of executive decisions.**

  6 years leading strategic data at national scale (France Travail · INSEE · DARES · URSSAF),
  6 MVPs shipped in production (NLP, RAG, Time Series, Lead Scoring),
  one goal: every executive decision backed by trusted data and an actionable model.

  ### 🎯 What I deliver

  * **Data Governance & DataOps :** Designed automated Quality Gate systems (QualiStat · Power BI/DAX) for national public indicator pipelines. Automated a SAP legacy pipeline — **3 days of monthly processing eliminated** (France Travail Real Estate Division). Authored full Data Lake technical requirements for national IS migration.
  * **BI & Executive Dashboards :** Audited, redesigned and delivered Digdash/Power BI dashboards at national scale (126+ users · 1,000+ sites). Defined end-to-end target data production processes and decision architecture.
  * **Applied AI (NLP / GenAI / Forecasting) :** Legal investigation reduced from 3 weeks to 4 hours (Juris Sensus AI · Zero-Shot NLP). CAPEX/OPEX forecasting on multi-site real estate portfolios (Time Series Prophet). RAG/LangChain architectures deployed on Streamlit.

  ### 🏗️ Domains & Sectors

  * **PropTech & Asset Management :** Modelling and operational tracking of national real estate portfolios (SPSI · RE-FX · French Tertiary Decree).
  * **LegalTech & Compliance :** Forensic NLP engines for large-scale semantic audit (E-Discovery · AI Act · GDPR).
  * **Labour Market & Public Policy :** Production and industrialisation of strategic indicators published at national level (datemploi · INSEE · DARES).

  ### 🛠️ Stack

  * **Product :** OKRs · PRD · MLOps Lifecycle · Backlog · Stakeholder Management
  * **Data Science & AI :** Python · XGBoost · Prophet · NLP (mDeBERTa, RAG, Zero-Shot) · LangChain
  * **Data Engineering :** SQL · SAS · VBA · SAP RE-FX · PySpark · API REST
  * **BI & Viz :** Power BI · DAX · Digdash Studio · Streamlit
  * **DevOps :** GitOps · CI/CD · Docs-as-Code · Docusaurus

