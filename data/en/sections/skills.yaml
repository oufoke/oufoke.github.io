skills:
- name: "Product Strategy & C-Level Steering"
  logo: "images/sections/skills/product.png"
  summary: "Strategic alignment between IT and business, steering the vision by decision value. OKR definition, complex PRD ownership, and translating business stakes for engineering."

- name: "Governance & DataOps"
  logo: "images/sections/skills/governance.png"
  summary: "Industrialising production (Docs-as-Code) and standing up Quality Gates. Reducing technical and documentation debt across national information systems (SAP, legacy)."

- name: "Applied AI (NLP / GenAI)"
  logo: "images/sections/skills/ai.png"
  summary: "Building forensic NLP engines with sovereign execution (LegalTech E-Discovery, Zero-Shot) and RAG architectures. Judging when embedding AI is actually worth it — and when it isn't."

- name: "Data Science & Engineering (Python/ML)"
  logo: "images/sections/skills/python.png"
  summary: "Hands-on technical depth (Python, XGBoost, Prophet, SHAP) to prototype and validate scoring, forecasting and explainable AI solutions end to end."

- name: "Institutional Data Architecture (SQL/SAS)"
  logo: "images/sections/skills/database.png"
  summary: "Designing and optimising secure large-scale pipelines for IT industrialisation and the French State's institutional partners (INSEE, DARES, URSSAF)."

- name: "Business Intelligence & Data Viz"
  logo: "images/sections/skills/powerbi.png"
  summary: "Auditing reporting estates and designing BI architectures (Power BI, advanced DAX, Digdash, Streamlit) for strategic steering and operational follow-up."

- name: "Agility & Production Lifecycle"
  logo: "images/sections/skills/agile.png"
  summary: "Orchestrating production cycles (GitOps, CI/CD). Driving continuous improvement between business analysis teams and the IT directorate."