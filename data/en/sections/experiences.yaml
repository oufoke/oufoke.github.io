experiences:
- company:
    name: France Travail (Headquarters)
    url: "https://www.francetravail.fr"
    location: Paris, France
    logo: /images/sections/experiences/logo-ft.svg 
    overview: "Building bridges between raw data complexity and strategic decision-making clarity, while ensuring the absolute reliability and industrialization of data production processes."
  
  positions:
  - designation: Senior Data Product Manager (Governance & Ops)
    start: May 2025
    responsibilities:
    - "**DataTrust Audit System:** Designed a governance product (Power BI / DAX) enforcing strict Quality Gates. Fully secured the delivery of public indicators to the IT department (zero defects in production)."
    - "**Enterprise Knowledge Framework:** Deployed a DataOps foundation (Docusaurus) in a highly secure environment. Centralized business rules and drastically reduced time-to-market."
    - "**Product Leadership:** Fostered strategic alignment between the Statistics Directorate and IT Engineering. Cultivated an agile and Docs-as-Code culture among business teams."

  - designation: Data Product Manager / Data Manager
    start: February 2020
    end: April 2025
    responsibilities:
    - "**Production Steering (Data Emploi):** Orchestration, process implementation, and production planning for strategic indicators published on the national datemploi portal."
    - "**Industrialization & Institutional Partnerships:** Design and implementation of complex SQL/SAS programs industrialized by the IT department for strategic partners (INSEE, DARES, etc.), securing large-scale data extractions."
    - "**Performance & Mediation:** Optimization of complex pipelines on the National Claimant File and translation of business requirements into technical specifications, ensuring high development ROI."