experiences:
- company:
    name: France Travail (HQ)
    url: "https://www.francetravail.fr"
    location: Paris, France
    logo: /images/sections/experiences/logo-ft.svg
    overview: "6 years transforming complex data systems into reliable decision-making products — from institutional data governance to applied AI. Expert at delivering in constrained environments: national information systems, sensitive data, IT/Business interface."

  positions:

  - designation: Senior Data Product Manager — National Real Estate Analytics
    start: May 2026
    end: July 2026
    responsibilities:
    - "**National Real Estate Dashboard (France Travail) :** Full audit of the existing dashboard (quantitative traffic analysis: 3,318 views · 126 users · 279 reports) and gap assessment against management decision needs. Defined the target data production process and new BI architecture — 101 indicators across 4 dimensions (floor space, budget, SPSI, leases) covering 1,000+ national sites and 20 Regional Directorates."
    - "**Digdash Dashboard & Strategic Tracking :** Delivered the Digdash dashboard with a strategic SPSI vs. actual RE-FX tracking module (projection/actual gaps across dimensions defined by management). Interactive France map and arbitration cockpit by domain."
    - "**Automation & Target Architecture :** Authored the DSI technical requirements document for SAP → Digdash automation (15 functional requirements, 5-phase migration plan). Deployed an interim Excel pipeline — **3 days of monthly manual processing eliminated** pending DSI implementation of the target process."

  - designation: Senior Data Product Manager — Governance & DataOps
    start: May 2025
    end: April 2026
    responsibilities:
    - "**QualiStat · DataTrust :** Designed and deployed an automated data governance system (Power BI / DAX) enforcing strict Quality Gates across the full production cycle of national public indicators (INSEE, DARES, datemploi). All deliveries validated before national exposure."
    - "**Enterprise Knowledge Framework :** Deployed a DataOps foundation (Docusaurus · Docs-as-Code) in a secured IT environment — single source of truth, eliminated version conflicts between business and tech teams. Measurable reduction in time-to-market for IS evolutions."
    - "**Cross-functional Product Leadership :** Strategic alignment between the Statistics Department and DGA Tech across 3 simultaneous products. Coached 10+ business analysts on agile workflows (sprints, backlog, success metrics defined before delivery)."

  - designation: Data Product Manager / Data Manager
    start: February 2020
    end: April 2025
    responsibilities:
    - "**National Production Management (Data Emploi) :** Strategic ownership of the national labour market indicator lifecycle published on datemploi.francetravail.fr — coordination with institutional partners (INSEE, DARES, URSSAF, Ministry of Labour), planning arbitration and roadmap prioritisation."
    - "**Industrialisation & Institutional Partnerships :** Designed complex extraction programmes (SQL, SAS) industrialised by the IT department for strategic State partners. Secured large-scale data flows on the National Beneficiary File (FNA)."
    - "**IT/Business Interface :** Translated business needs into architecture decisions and technical trade-offs — from functional specification through to production sign-off. Single interface between statistics teams and IT over 5 years."