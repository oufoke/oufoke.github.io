    - "**Leadership Transverse :** Interface unique entre la DGA SI (Tech) et les Directions Métiers. Traduction des besoins business en roadmap technique (Priorisation RICE) et évangélisation de l'IA Générative auprès des équipes opérationnelles."

  - designation: Data Product Manager / Data Manager
    start: Février 2020
    end: Avril 2025
    responsibilities:
    - "**Pilotage du Produit 'Smart Emploi' :** Orchestration du cycle de vie des données pour le SI décisionnel. Gestion du backlog et coordination des recettes avec les équipes MOE/MOA."
    - "**Architecture de Pipelines ETL :** Optimisation des flux de données massifs (SAS vers Python/SQL). **Résultat :** Fiabilisation des indicateurs de performance diffusés aux agences et partenaires."
    - "**Gouvernance  :** Mise en place de contrats d'interface stricts pour garantir l'intégrité des données exposées via 'Data Emploi', assurant la conformité RGPD et la stabilité du service."