    logo: /images/sections/experiences/logo-ft.svg 
    overview: "Je construis des ponts entre la complexité des données brutes et la clarté de la décision stratégique, tout en garantissant la fiabilisation et l'industrialisation des processus de production de données."
  
  positions:
  - designation: Senior Data Product Manager (Gouvernance & Ops)
    start: Mai 2025
    responsibilities:
    - "**DataTrust Audit System :** Conception d'un produit de gouvernance (Power BI / DAX) imposant des Quality Gates stricts. Sécurisation totale de la livraison des indicateurs publics vers la DSI (zéro défaut en production)."
    - "**Enterprise Knowledge Framework :** Déploiement d'un socle DataOps (Docusaurus) en environnement ultra-sécurisé. Centralisation des règles métier et réduction drastique du time-to-market."
    - "**Product Leadership :** Alignement stratégique entre la Direction des Statistiques et la DGA Tech. Acculturation des équipes de Maîtrise d'Ouvrage aux workflows agiles (Docs-as-Code)."

  - designation: Data Product Manager / Data Manager
    start: Février 2020
    end: Avril 2025
    responsibilities:
    - "**Pilotage de Production (Data Emploi) :** Orchestration, mise en place de processus et pilotage du planning de production des indicateurs stratégiques diffusés sur le portail national datemploi."
    - "**Industrialisation & Partenariats Institutionnels :** Conception et mise en place de programmes complexes (SQL, SAS) industrialisés par la DSI pour les partenaires stratégiques (INSEE, DARES, etc.), sécurisant les extractions de données à grande échelle."
    - "**Performance & Médiation :** Optimisation des pipelines complexes sur le Fichier National des Allocataires et traduction des enjeux métiers en spécifications techniques garantissant le ROI des développements."