# ── NOUVEAU PROJET PRIORITAIRE ────────────────────────────────────────────────
- name: "OptIMMO — Boussole Décisionnelle Immobilier"
  logo: "/images/sections/projects/dataops-logo.png"
  image: "/images/sections/projects/Dataops.png"
  role: "Senior Data Product Manager"
  timeline: "2026"
  url: "https://github.com/oufoke"
  summary: |
    La direction immobilière de France Travail (DICN) pilotait 1 000+ sites sans outil
    de comparaison SPSI vs réalisé, sur un BI vieillissant consulté 3 318 fois/mois
    par 126 utilisateurs. Restructuration complète du tableau de bord Digdash OptIMMO
    (279 rapports · 42 sources · 4 pôles thématiques), automatisation du pipeline
    SAP RE-FX → Excel → Digdash (VBA, −4h/mois), et conception d'un module de
    pilotage stratégique SPSI (5 indicateurs C-Level : écart budget/loyer, jalons,
    m² SDP/SUB, VNC). Rédaction de l'EDB Data Lake complète (15 exigences) pour la
    DSI. Résultat : zéro dépendance manuelle sur le cycle de production mensuel.
  tags: ["gov", "biz"]

# ── PROJETS EXISTANTS RÉÉCRITES ───────────────────────────────────────────────
- name: "Real Estate Data Control Tower"
  logo: "/images/sections/projects/prophet.png"
  image: "/images/sections/projects/prophet.png"
  role: "Senior Data Product Manager"
  timeline: "2026"
  url: "https://github.com/oufoke/Real-Estate-Data-Control-Tower"
  summary: |
    Les asset managers immobiliers manquent de visibilité sur leurs CAPEX/OPEX à
    18 mois, prenant des décisions budgétaires à l'aveugle. Conception d'une tour
    de contrôle prédictive (Time Series Prophet + Power BI) simulant les scénarios
    d'investissement sur un portefeuille multi-sites. Réduction de l'incertitude
    budgétaire de ±30% → pilotage proactif des arbitrages CAPEX/OPEX.
  tags: ["ai", "biz"]

- name: "Juris Sensus AI"
  logo: "/images/sections/projects/juris-sensus-showcase-logo.png"
  image: "/images/sections/projects/juris-sensus-showcase.png"
  role: "Product Builder / AI Engineer"
  timeline: "2026"
  url: "https://github.com/oufoke/juris-sensus-ai"
  summary: |
    Les équipes juridiques et compliance passaient 3 semaines à analyser manuellement
    des corpus massifs de documents pour détecter fraudes et risques légaux. Pipeline
    forensique NLP (Zero-Shot Classification · mDeBERTa-v3) automatisant la détection
    et le classement sémantique des risques sur 10 000+ fichiers hétérogènes.
    Temps d'investigation réduit de 3 semaines à 4 heures (−95%).
  tags: ["ai", "biz"]

- name: "HR-Tech AI Screener"
  logo: "/images/sections/projects/smart-screener.png"
  image: "/images/sections/projects/smart-screener.png"
  role: "AI Product Manager"
  timeline: "2024 - 2025"
  url: "https://smart-screener-ofk-zpgy6gg8dn56wvapifnxxc.streamlit.app/"
  summary: |
    Les recruteurs perdaient 6+ heures par semaine en lecture de CV sans garantie
    de cohérence d'évaluation entre candidats. Assistant de recrutement intelligent
    (Architecture RAG · LangChain · GPT-4o) analysant sémantiquement les CV,
    détectant les incohérences via Quality Gates et générant des guides d'entretien
    personnalisés. Déployé sur Streamlit, opérationnel en 30 secondes.
  tags: ["ai"]

- name: "B2B Predictive Lead Scoring"
  logo: "/images/sections/projects/xgboost.png"
  image: "/images/sections/projects/xgboost.png"
  role: "ML Engineer / PM"
  timeline: "Dec 2025"
  url: "https://lead-scoring-portofolio-ofk.streamlit.app/"
  summary: |
    Les équipes commerciales B2B traitaient tous leurs leads avec la même priorité,
    diluant l'effort de vente et gonflant le CAC. Moteur de scoring IA explicable
    (XGBoost · SHAP) priorisant automatiquement les leads par probabilité de
    conversion. Modèle interprétable (SHAP) permettant aux commerciaux de comprendre
    et d'agir sur les facteurs de scoring. Déployé sur Streamlit.
  tags: ["ai", "biz"]

- name: "QualiStat — Data Trust Audit System"
  logo: "/images/sections/projects/QualiStat-logo.png"
  image: "/images/sections/projects/qualistat.png"
  role: "Data Governance Lead"
  timeline: "2025 - 2026"
  url: "https://github.com/oufoke/datatrust-audit-system"
  summary: |
    Les indicateurs statistiques publics étaient livrés à la DSI sans contrôle
    qualité systématique, exposant l'organisation à des erreurs de reporting national.
    Produit de gouvernance (Power BI · DAX avancé) imposant des Quality Gates stricts
    à chaque cycle de production. Résultat : zéro défaut en production sur 12 mois,
    100% des livraisons validées avant exposition publique.
  tags: ["gov"]

- name: "DataBridge Ops — MAP/GPS MOA"
  logo: "/images/sections/projects/dataops-logo.png"
  image: "/images/sections/projects/Dataops.png"
  role: "DataOps Architect"
  timeline: "2025"
  url: "https://github.com/oufoke/DataBridge-Ops"
  summary: |
    Les équipes MOA documentaient les règles de gestion métier dans des silos
    disparates, créant une dette documentaire freinant chaque évolution SI.
    Socle DataOps (Docs-as-Code · Docusaurus) centralisant les règles de gestion
    en source unique de vérité, déployé via CI/CD en environnement ultra-sécurisé.
    Réduction du time-to-market sur les évolutions métier et suppression des
    conflits de versions entre équipes MOA et DGA SI.
  tags: ["gov"]
