summary: |
  <b>Je ne me contente pas de livrer des features Data : je transforme la complexité technique en levier de croissance business.</b><br><br>
  
  Senior Data Product Manager avec <b>6 ans d'expérience</b>, j'opère à l'interface stratégique entre la DSI (Tech) et le Métier. Chez <b>France Travail</b>, je pilote l'industrialisation de produits Data critiques et la modernisation de la gouvernance (Doc-as-Code, Quality Gates).<br><br>
  
  <b>Ma valeur ajoutée ?</b> Une double compétence rare :
  <ul>
    <li><b>Vision Produit :</b> Discovery, Roadmap RICE, et alignement des parties prenantes (C-Level).</li>
    <li><b>Ancrage Technique :</b> Capacité à auditer du code (Python, SQL), concevoir des architectures IA (RAG) et dialoguer d'égal à égal avec les développeurs.</li>
  </ul>
  
  Mon objectif : Dérisquer vos projets data/I.A. et maximiser leur adoption utilisateur.

