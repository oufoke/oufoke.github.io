summary: |
  **Mathématicien-Ingénieur Data de formation, je transforme des systèmes data complexes en produits IA déployables — de la gouvernance institutionnelle jusqu'au dernier mile décisionnel.**

  6 ans à piloter des données stratégiques à l'échelle nationale (France Travail · INSEE · DARES · URSSAF),
  6 MVPs IA livrés en production (NLP, RAG, Time Series, Lead Scoring),
  un seul objectif : que chaque décision de direction s'appuie sur une donnée fiable et un modèle actionnable.

  ### 🎯 Ce que j'apporte concrètement

  * **Gouvernance & DataOps :** Conception de systèmes de Quality Gates automatisés (QualiStat · Power BI/DAX) sur des pipelines d'indicateurs publics nationaux. Automatisation d'un pipeline SAP legacy — **3 jours de traitement mensuel supprimés** (Direction Immobilière France Travail). Rédaction d'EDB Data Lake pour migration SI nationale.
  * **BI & Pilotage C-Level :** Restructuration de tableaux de bord BI (Digdash · Power BI) utilisés par 126+ utilisateurs actifs. Conception d'outils de pilotage et de décision stratégique pour la direction immobilière nationale (1 000+ sites).
  * **IA Appliquée (NLP / GenAI / Forecasting) :** Investigation légale de 3 semaines ramenée à 4 heures (Juris Sensus AI · Zero-Shot NLP). Anticipation CAPEX/OPEX sur portefeuilles immobiliers multi-sites (Time Series Prophet). Architectures RAG déployées sur Streamlit.

  ### 🏗️ Domaines & Secteurs

  * **PropTech & Asset Management :** Modélisation budgétaire et pilotage de parcs immobiliers nationaux (SPSI · RE-FX · Décret Tertiaire).
  * **LegalTech & Compliance :** Moteurs NLP forensiques pour audit sémantique massif (E-Discovery · AI Act · RGPD).
  * **Emploi & Politiques Publiques :** Production et industrialisation d'indicateurs stratégiques diffusés au niveau national (datemploi · INSEE · DARES).

  ### 🛠️ Stack

  * **Product :** OKRs · PRD · MLOps Lifecycle · Backlog · Stakeholder Management
  * **Data Science & IA :** Python · XGBoost · Prophet · NLP (mDeBERTa, RAG, Zero-Shot) · LangChain
  * **Data Engineering :** SQL · SAS · VBA · SAP RE-FX · PySpark · API REST
  * **BI & Viz :** Power BI · DAX avancé · Digdash Studio · Streamlit
  * **DevOps :** GitOps · CI/CD · Docs-as-Code · Docusaurus

