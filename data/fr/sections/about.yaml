  Data Product Manager avec **6 ans d'expérience**, je me situe à l'interface stratégique entre la DSI et les directions métiers. <br><br>
  Expert dans la transformation de besoins complexes en produits data à fort impact, je travaille actuellement chez **France Travail** sur l'évolution de plusieurs produits data. <br><br>
  Certifié Data Scientist, Data Engineer et AI Engineer, j'allie une rigueur technique (SQL, Python, SAS) à une vision produit centrée sur l'utilisateur : **Product Discovery**, **Gouvernance des données** et **Accompagnement au changement**.

