skills:
- name: "Stratégie Produit & Pilotage C-Level"
  logo: "images/sections/skills/product.png"
  summary: "Alignement stratégique (DSI/Métiers) et pilotage de la vision par le ROI. Définition d'OKRs, gestion de PRD complexes et traduction des enjeux pour l'ingénierie."

- name: "Gouvernance & DataOps"
  logo: "images/sections/skills/governance.png"
  summary: "Industrialisation de la production (Docs-as-Code) et mise en place de Quality Gates. Réduction de la dette technique sur des SI nationaux (SAP, Legacy)."

- name: "Forecasting & IA Appliquée (NLP/GenAI)"
  logo: "images/sections/skills/ai.png"
  summary: "Déploiement de modèles prédictifs (Time Series) et conception de moteurs NLP forensiques (LegalTech E-Discovery, Architectures RAG)."

- name: "Data Science & Ingénierie (Python/ML)"
  logo: "images/sections/skills/python.png"
  summary: "Expertise technique (Python, XGBoost, Prophet) pour prototyper et industrialiser des solutions de Lead Scoring et de prévisions budgétaires (PropTech)."

- name: "Architecture Data Institutionnelle (SQL/SAS)"
  logo: "images/sections/skills/database.png"
  summary: "Conception et optimisation de pipelines massifs sécurisés pour l'industrialisation DSI et les partenaires stratégiques de l'État (INSEE, DARES)."

- name: "Business Intelligence & Data Viz"
  logo: "images/sections/skills/powerbi.png"
  summary: "Conception d'architectures décisionnelles (Power BI, DAX avancé, Streamlit) pour le pilotage stratégique (ComEx) et le suivi opérationnel."

- name: "Agilité & MLOps Lifecycle"
  logo: "images/sections/skills/agile.png"
  summary: "Orchestration des cycles de production (GitOps, CI/CD). Animation de l'amélioration continue entre les équipes MOA et la DGA SI."