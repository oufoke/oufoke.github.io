baseURL: "https://oufoke.github.io/"
languageCode: fr-fr
title: "Oumar F. KEBE | Senior Data Product Manager | Expert IA & Gouvernance"
ignoreLogs:
  - warning-goldmark-raw-html

# ─── LANGUES ──────────────────────────────────────────────
defaultContentLanguage: fr
defaultContentLanguageInSubdir: true

languages:
  fr:
    languageName: Français
    weight: 1
    params:
      flag: "fr"        # ← code du fichier flag-icons (fr.svg)
  en:
    languageName: English
    weight: 2
    params:
      flag: "gb"        # ← code du fichier flag-icons (gb.svg)

# ─── MODULES V4 ───────────────────────────────────────────
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
    mounts:
    - source: assets
      target: assets
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
    - source: static
      target: static
  mounts:
  - source: content
    target: content
  - source: assets
    target: assets
  - source: layouts
    target: layouts
  - source: static
    target: static
  - source: data
    target: data
  - source: i18n
    target: i18n
  - source: node_modules/flag-icons/flags
    target: static/flags
  - source: node_modules/@fontsource/mulish/files
    target: static/files
  - source: node_modules/katex/dist/fonts
    target: static/fonts

# ─── PARAMS (UN SEUL BLOC) ────────────────────────────────
params:
  # Backgrounds
  background: "images/site/light_back.png"
  darkBackground: "images/site/dark_back.png"

  # Auteur
  author:
    name: "Oumar KEBE"
    image: "images/author/oumar_pro.png"

  # Fonctionnalités
  features:
    darkMode:
      enable: true
      defaultMode: "light"
    language:
      enable: true


