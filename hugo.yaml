baseURL: "https://oufoke.github.io/"
languageCode: fr-fr
title: "Oumar Fodé KEBE | Portfolio"
ignoreLogs:
  - warning-goldmark-raw-html

# ─── CONFIGURATION DES LANGUES ───────────────────────
defaultContentLanguage: fr
defaultContentLanguageInSubdir: true

languages:
  fr:
    languageName: Français
    weight: 1
    params:
      flag: "fr"          # Code ISO du fichier dans node_modules/flag-icons/flags/4x3/
  en:
    languageName: English
    weight: 2
    params:
      flag: "gb"          # gb.svg et non uk.svg — attention !

# ─── MODULES ET MONTAGES V4 ──────────────────────────
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
    mounts:
    - source: assets
      target: assets
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
    - source: static
      target: static
  mounts:
  - source: content
    target: content
  - source: assets
    target: assets
  - source: layouts
    target: layouts
  - source: static
    target: static
  - source: data
    target: data
  - source: i18n
    target: i18n
  # IMPORTANT : flag-icons (sans -css)
  - source: node_modules/flag-icons/flags
    target: static/flags
  - source: node_modules/@fontsource/mulish/files
    target: static/files
  - source: node_modules/katex/dist/fonts
    target: static/fonts

# ─── PARAMÈTRES (UN SEUL BLOC PARAMS UNIQUE) ─────────
params:
  # Apparence et Backgrounds
  background: "images/site/light_back.png"
  darkBackground: "images/site/dark_back.png"

  # Auteur (Fix pour l'erreur nil pointer)
  author:
    name: "Oumar KEBE"
    image: "images/author/oumar_pro.png"

  # Fonctionnalités
  features:
    darkMode:
      enable: true
      defaultMode: "light"
    language:
      enable: true        # Activation du sélecteur de langue
    footer:
      enable: true
      navigation:
        enable: true
      contactMe:
        enable: true