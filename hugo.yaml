baseURL: "https://oufoke.github.io/portofolio-oumar/"
languageCode: fr-fr
title: "Oumar KEBE | Data Product Manager"

theme: "toha"

module:
  mounts:
  - source: static/files
    target: static/files
  - source: node_modules/flag-icons/flags
    target: static/flags
  - source: node_modules/@fontsource/mulish/files
    target: static/files
  - source: node_modules/katex/dist/fonts
    target: static/fonts

languages:
  en:
    contentDir: content/en
    languageName: English
    weight: 2
  fr:
    contentDir: content/fr
    languageName: Français
    weight: 1

defaultContentLanguage: fr

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  background: /images/site/2bckoke.jpg
  darkBackground: /images/site/ok.png
  logo:
    main: /images/site/Logo_oumar.png
    inverted: /images/site/inverted_logo_oumar.png
    favicon: /images/site/favicon_o.png
  gitRepo: https://github.com/oufoke/portofolio-oumar
  gitBranch: main
  
  topNavbar:
    maxVisibleSections: 2
  
  features:
    theme:
      enable: true
      services:
        default: system
    portfolio:
      enable: true
    blog:
      enable: false
    toc:
      enable: true
    tags:
      enable: true
    flags:
      enable: true
  
  footer:
    enable: true
    template: footer.html

# --- C'EST ICI QUE L'ORDRE EST DÉFINI ---
menu:
  main:
    - identifier: about
      name: "À Propos"
      url: "/#about"
      weight: 10
    
    - identifier: skills
      name: "Compétences"
      url: "/#skills"
      weight: 9
    
    - identifier: experience
      name: "Expériences"
      url: "/#experience"
      weight: 8
    
    - identifier: projects
      name: "Projets"
      url: "/#projects"
      weight: 7
      
    - identifier: accomplishments
      name: "Engagements"
      url: "/#accomplishments"
      weight: 0

    - identifier: education
      name: "Formation"
      url: "/#education"
      weight: 5
      
      

