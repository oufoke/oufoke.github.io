name: "Theme Update"

on:
  # Vérifie tous les jours à minuit si une mise à jour existe
  schedule:
    - cron: "0 0 * * *"
  # Permet de lancer la vérification manuellement si besoin
  workflow_dispatch:

# 🔴 INDISPENSABLE : Corrige l'erreur "Create Pull Request" de votre capture
permissions:
  contents: write
  pull-requests: write

jobs:
  update-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          submodules: recursive
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Check for updates
        id: update
        run: |
          # Cette commande doit télécharger les nouveautés
          # Si aucune nouveauté n'est trouvée, git ne détectera aucun changement de fichier
          mise run update-to-main

      - name: Build Verification
        run: |
          # On vérifie que la mise à jour ne casse pas le site
          hugo --minify
          rm -rf public/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automated/theme-update
          delete-branch: true
          title: "chore: update theme"
          body: "Une nouvelle version du thème a été détectée et validée."
          commit-message: "chore: update theme"
          labels: automerge
          # L'action est intelligente : si "mise run update-to-main" n'a rien modifié,
          # l'action s'arrête ici SILENCIEUSEMENT. Pas de PR inutile.